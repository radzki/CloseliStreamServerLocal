# Eoolii Camera Local Relay - Docker Compose
#
# Usage:
#   docker-compose up -d                    # Start all services
#   docker-compose up -d relay api          # Start only relay and API
#   docker-compose --profile camera1 up -d  # Include camera1 stream server
#   docker-compose logs -f relay            # View relay logs
#
# For multiple cameras, either:
#   1. Use profiles (camera1, camera2, etc.) - predefined in this file
#   2. Use docker-compose.override.yml for custom camera configs
#   3. Use the stream-manager service (if enabled)

services:
  # ==========================================================================
  # Core Services
  # ==========================================================================

  relay:
    build: .
    container_name: eoolii-relay
    command: python3 -u local_relay_server.py
    restart: unless-stopped
    ports:
      - "50721:50721" # Relay port (cameras connect here)
      - "50722:50722" # Management CLI port
    volumes:
      - ./server.crt:/app/server.crt:ro
      - ./server.key:/app/server.key:ro
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - RELAY_HOST=0.0.0.0
      - LOCAL_IP=${LOCAL_IP:-192.168.1.100}
      - RELAY_PORT=50721
      - MGMT_PORT=50722
      - DEBUG_MODE=${DEBUG_MODE:-false}
    networks:
      - eoolii-net
    healthcheck:
      test: [ "CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1', 50722)); s.close()" ]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build: .
    container_name: eoolii-api
    command: python3 -u mock_api_server.py
    restart: unless-stopped
    ports:
      - "443:443" # HTTPS API port
    volumes:
      - ./server.crt:/app/server.crt:ro
      - ./server.key:/app/server.key:ro
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL_IP=${LOCAL_IP:-192.168.1.100}
      - RELAY_PORT=50721
      - MGMT_PORT=50722
      - API_PORT=443
    networks:
      - eoolii-net
    depends_on:
      - relay

  # ==========================================================================
  # Stream Servers (one per camera)
  # Use profiles to enable specific cameras
  # ==========================================================================

  # Camera 1 Stream Server
  stream-camera1:
    build: .
    container_name: eoolii-stream-camera1
    command: >
      python3 -u stream_server.py --device_id ${CAMERA1_DEVICE_ID:-xxxxS_000000000001} --port 8081 --relay_host relay --relay_port 50721
    restart: unless-stopped
    profiles:
      - camera1
      - all-cameras
    ports:
      - "8081:8081" # Video: http://localhost:8081/camera/video
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL_IP=relay # Connect to relay container
      - RELAY_PORT=50721
      - HTTP_PORT=8081
      - USER_EMAIL=${USER_EMAIL:-user@example.com}
      - PRODUCT_KEY=${PRODUCT_KEY:-}
    networks:
      - eoolii-net
    depends_on:
      - relay

  # Camera 2 Stream Server
  stream-camera2:
    build: .
    container_name: eoolii-stream-camera2
    command: >
      python3 -ustream_server.py --device_id ${CAMERA2_DEVICE_ID:-xxxxS_000000000002} --port 8082 --relay_host relay --relay_port 50721
    restart: unless-stopped
    profiles:
      - camera2
      - all-cameras
    ports:
      - "8082:8082" # Video: http://localhost:8082/camera/video
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL_IP=relay
      - RELAY_PORT=50721
      - HTTP_PORT=8082
      - USER_EMAIL=${USER_EMAIL:-user@example.com}
      - PRODUCT_KEY=${PRODUCT_KEY:-}
    networks:
      - eoolii-net
    depends_on:
      - relay

  # Camera 3 Stream Server
  stream-camera3:
    build: .
    container_name: eoolii-stream-camera3
    command: >
      python3 -u stream_server.py --device_id ${CAMERA3_DEVICE_ID:-xxxxS_000000000003} --port 8083 --relay_host relay --relay_port 50721
    restart: unless-stopped
    profiles:
      - camera3
      - all-cameras
    ports:
      - "8083:8083"
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL_IP=relay
      - RELAY_PORT=50721
      - HTTP_PORT=8083
      - USER_EMAIL=${USER_EMAIL:-user@example.com}
      - PRODUCT_KEY=${PRODUCT_KEY:-}
    networks:
      - eoolii-net
    depends_on:
      - relay

  # Camera 4 Stream Server
  stream-camera4:
    build: .
    container_name: eoolii-stream-camera4
    command: >
      python3 -u stream_server.py --device_id ${CAMERA4_DEVICE_ID:-xxxxS_000000000004} --port 8084 --relay_host relay --relay_port 50721
    restart: unless-stopped
    profiles:
      - camera4
      - all-cameras
    ports:
      - "8084:8084"
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL_IP=relay
      - RELAY_PORT=50721
      - HTTP_PORT=8084
      - USER_EMAIL=${USER_EMAIL:-user@example.com}
      - PRODUCT_KEY=${PRODUCT_KEY:-}
    networks:
      - eoolii-net
    depends_on:
      - relay

  # ==========================================================================
  # CLI Tool (for debugging - run interactively)
  # ==========================================================================

  cli:
    build: .
    container_name: eoolii-cli
    entrypoint: python3
    command: relay_cli.py status
    profiles:
      - cli
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - MGMT_PORT=50722
    networks:
      - eoolii-net
    depends_on:
      - relay

networks:
  eoolii-net:
    driver: bridge
